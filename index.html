<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#000000">
    <title>SwipeNote</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header id="header">
        <span id="note-count">0 notes</span>
    </header>

    <main id="notes-container">
        <div id="empty-state">
            <p class="empty-title">SwipeNote</p>
            <p class="empty-hint">Tap anywhere to start</p>
            <p class="empty-sub">Swipe up for new notes</p>
        </div>
    </main>

    <button id="trash-btn" aria-label="Delete note">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
        </svg>
    </button>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-box">
            <p>Delete this note?</p>
            <div class="modal-actions">
                <button id="confirm-cancel">Cancel</button>
                <button id="confirm-delete">Delete</button>
            </div>
        </div>
    </div>

    <div id="dot-indicators"></div>

    <script src="script.js"></script>
</body>
</html>
